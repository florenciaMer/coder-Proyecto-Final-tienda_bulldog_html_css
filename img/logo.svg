<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line {
        fill: none;
        stroke: #111;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fill {
        fill: #111;
      }
      .light {
        fill: #f4f4f4;
      }
      .accent {
        fill: #c58b4e;
      }
      .text-main {
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 28px;
        fill: #111;
        letter-spacing: 2px;
      }
      .text-sub {
        font-family: Arial, sans-serif;
        font-size: 12px;
        fill: #666;
        letter-spacing: 3px;
      }
    </style>
  </defs>

  <!-- ICONO -->
  <g transform="translate(100,20)">
    <circle cx="100" cy="100" r="90" fill="#fff" stroke="#111" stroke-width="5"></circle>

    <!-- Cabeza -->
    <path class="light" d="
      M40 90
      Q40 60 70 55
      Q100 45 130 55
      Q160 60 160 90
      Q160 150 100 170
      Q40 150 40 90
      Z" stroke="#111" stroke-width="5"></path>

    <!-- Mancha -->
    <path class="accent" d="
      M110 60
      Q160 80 140 150
      Q110 135 110 60
      Z" opacity="0.6"></path>

    <!-- Orejas -->
    <path class="line" d="M60 65 Q45 40 75 55"></path>
    <path class="line" d="M140 65 Q155 40 125 55"></path>

    <!-- Ojos -->
    <ellipse cx="75" cy="100" rx="6" ry="5" class="fill"></ellipse>
    <ellipse cx="125" cy="100" rx="6" ry="5" class="fill"></ellipse>

    <!-- Pliegues -->
    <path class="line" d="M75 80 Q100 65 125 80"></path>
    <path class="line" d="M85 95 Q100 85 115 95"></path>

    <!-- Hocico -->
    <ellipse cx="100" cy="125" rx="30" ry="22" fill="#fff" stroke="#111" stroke-width="5"></ellipse>

    <!-- Nariz -->
    <ellipse cx="100" cy="120" rx="12" ry="9" class="fill"></ellipse>

    <!-- Boca -->
    <path class="line" d="M80 140 Q100 160 120 140"></path>
  </g>

  <!-- TEXTO -->
  <text x="200" y="240" text-anchor="middle" class="text-main">
    BULLDOG PET SHOP
  </text>

  <text x="200" y="265" text-anchor="middle" class="text-sub">
    TIENDA DE MASCOTAS
  </text>

</svg>
