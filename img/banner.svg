<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="800" height="300" fill="#f5f5f5"></rect>

  <!-- Mancha decorativa -->
  <circle cx="650" cy="150" r="180" fill="#c58b4e" opacity="0.15"></circle>

  <!-- Texto -->
  <text x="60" y="120" font-family="Arial" font-size="34" font-weight="bold" fill="#111">
    TODO PARA TU
  </text>

  <text x="60" y="170" font-family="Arial" font-size="46" font-weight="bold" fill="#c58b4e">
    BULLDOG
  </text>

  <text x="60" y="210" font-family="Arial" font-size="16" fill="#555">
    Productos cómodos, resistentes y con estilo
  </text>

  <!-- Bulldog más trabajado -->
  <g transform="translate(500,50)">
    
    <!-- Cabeza -->
    <ellipse cx="120" cy="110" rx="95" ry="80" fill="#fff" stroke="#111" stroke-width="4"></ellipse>

    <!-- Mancha -->
    <path d="M120 40 Q200 80 160 170 Q120 150 120 40Z" fill="#c58b4e" opacity="0.5"></path>

    <!-- Orejas -->
    <path d="M60 70 Q40 20 90 50" fill="#fff" stroke="#111" stroke-width="4"></path>
    <path d="M180 70 Q200 20 150 50" fill="#c58b4e" stroke="#111" stroke-width="4"></path>

    <!-- Ojos -->
    <ellipse cx="85" cy="105" rx="8" ry="6" fill="#111"></ellipse>
    <ellipse cx="155" cy="105" rx="8" ry="6" fill="#111"></ellipse>

    <!-- Pliegues -->
    <path d="M85 85 Q120 60 155 85" stroke="#111" stroke-width="3" fill="none"></path>
    <path d="M95 105 Q120 90 145 105" stroke="#111" stroke-width="2" fill="none"></path>

    <!-- Hocico -->
    <ellipse cx="120" cy="135" rx="45" ry="30" fill="#fff" stroke="#111" stroke-width="4"></ellipse>

    <!-- Nariz -->
    <ellipse cx="120" cy="125" rx="14" ry="10" fill="#111"></ellipse>

    <!-- Boca -->
    <path d="M90 155 Q120 180 150 155" stroke="#111" stroke-width="3" fill="none"></path>

    <!-- Puntitos -->
    <circle cx="100" cy="140" r="2" fill="#111"></circle>
    <circle cx="140" cy="140" r="2" fill="#111"></circle>

  </g>
</svg>
